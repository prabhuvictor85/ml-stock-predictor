<svg viewBox="0 0 620 260" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="620" height="260" fill="#ffffff"/>
  <text x="310" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Trend flags at a glance</text>

  <!-- rolling SMA (e.g. 20d) dashed line, price stays above it the whole stretch -->
  <polyline points="50,190 110,182 170,172 230,162 290,150 350,138 410,124 470,110 530,96 580,84"
            fill="none" stroke="#888" stroke-width="2.5" stroke-dasharray="7 4"/>
  <text x="470" y="130" font-size="12" fill="#777">rolling SMA (the "trend" window)</text>

  <!-- candles, every one closing above the SMA line -->
  <g>
    <line x1="80"  y1="150" x2="80"  y2="195" stroke="#1e7e34" stroke-width="2"/>
    <rect x="68"  y="160" width="24" height="25" fill="#5cb85c" stroke="#1e7e34" stroke-width="1.5"/>
    <line x1="140" y1="140" x2="140" y2="185" stroke="#1e7e34" stroke-width="2"/>
    <rect x="128" y="150" width="24" height="25" fill="#5cb85c" stroke="#1e7e34" stroke-width="1.5"/>
    <line x1="200" y1="128" x2="200" y2="172" stroke="#1e7e34" stroke-width="2"/>
    <rect x="188" y="138" width="24" height="24" fill="#5cb85c" stroke="#1e7e34" stroke-width="1.5"/>
    <line x1="260" y1="115" x2="260" y2="160" stroke="#1e7e34" stroke-width="2"/>
    <rect x="248" y="125" width="24" height="24" fill="#5cb85c" stroke="#1e7e34" stroke-width="1.5"/>
    <line x1="320" y1="102" x2="320" y2="148" stroke="#1e7e34" stroke-width="2"/>
    <rect x="308" y="112" width="24" height="24" fill="#5cb85c" stroke="#1e7e34" stroke-width="1.5"/>
    <line x1="380" y1="88"  x2="380" y2="136" stroke="#1e7e34" stroke-width="2"/>
    <rect x="368" y="98"  width="24" height="24" fill="#5cb85c" stroke="#1e7e34" stroke-width="1.5"/>
    <line x1="440" y1="75"  x2="440" y2="122" stroke="#1e7e34" stroke-width="2"/>
    <rect x="428" y="85"  width="24" height="24" fill="#5cb85c" stroke="#1e7e34" stroke-width="1.5"/>
    <line x1="500" y1="60"  x2="500" y2="108" stroke="#1e7e34" stroke-width="2"/>
    <rect x="488" y="70"  width="24" height="24" fill="#5cb85c" stroke="#1e7e34" stroke-width="1.5"/>
    <line x1="560" y1="45"  x2="560" y2="95"  stroke="#1e7e34" stroke-width="2"/>
    <rect x="548" y="55"  width="24" height="24" fill="#5cb85c" stroke="#1e7e34" stroke-width="1.5"/>
  </g>

  <text x="310" y="225" text-anchor="middle" font-size="13" fill="#333">Every candle here closes ABOVE the rolling SMA → weekly_trend = 1.0 for this whole stretch</text>
  <text x="310" y="245" text-anchor="middle" font-size="12" fill="#777">(the SAME check runs independently at the 60d/120d/240d windows for monthly/quarterly/yearly_trend)</text>
</svg>
