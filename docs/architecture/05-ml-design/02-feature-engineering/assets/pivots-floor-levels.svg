<svg viewBox="0 0 560 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="560" height="300" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Floor pivots: derived from yesterday, applied today</text>

  <!-- Yesterday's candle -->
  <line x1="110" y1="80"  x2="110" y2="220" stroke="#2e6da4" stroke-width="2"/>
  <rect x="90"  y="120" width="40" height="60" fill="#7fb3e8" stroke="#2e6da4" stroke-width="2"/>
  <text x="110" y="240" text-anchor="middle" font-size="12" fill="#333">Yesterday's</text>
  <text x="110" y="256" text-anchor="middle" font-size="12" fill="#333">candle (H, L, C)</text>

  <!-- Today's levels, fixed BEFORE today opens -->
  <line x1="170" y1="40"  x2="500" y2="40"  stroke="#a02c2c" stroke-width="1.5"/>
  <text x="505" y="44" font-size="12" fill="#a02c2c">R3</text>
  <line x1="170" y1="70"  x2="500" y2="70"  stroke="#c0392b" stroke-width="1.5"/>
  <text x="505" y="74" font-size="12" fill="#c0392b">R2</text>
  <line x1="170" y1="100" x2="500" y2="100" stroke="#e0715e" stroke-width="1.5"/>
  <text x="505" y="104" font-size="12" fill="#e0715e">R1</text>

  <line x1="170" y1="150" x2="500" y2="150" stroke="#333" stroke-width="2.5"/>
  <text x="505" y="154" font-size="13" font-weight="bold" fill="#333">PP</text>

  <line x1="170" y1="200" x2="500" y2="200" stroke="#3d8b53" stroke-width="1.5"/>
  <text x="505" y="204" font-size="12" fill="#3d8b53">S1</text>
  <line x1="170" y1="230" x2="500" y2="230" stroke="#2e7d43" stroke-width="1.5"/>
  <text x="505" y="234" font-size="12" fill="#2e7d43">S2</text>
  <line x1="170" y1="260" x2="500" y2="260" stroke="#1e6a34" stroke-width="1.5"/>
  <text x="505" y="264" font-size="12" fill="#1e6a34">S3</text>

  <text x="280" y="285" text-anchor="middle" font-size="12" fill="#333">PP = (H+L+C)/3 · R1=2·PP−L · S1=2·PP−H — all fixed before today's first tick</text>
</svg>
