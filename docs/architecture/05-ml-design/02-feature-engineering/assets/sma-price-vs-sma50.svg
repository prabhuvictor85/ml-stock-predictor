<svg viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="640" height="300" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Price stretching away from a rising SMA50</text>

  <!-- SMA50 dashed line, rising, always below price -->
  <polyline points="60,260 120,258 180,254 240,248 300,238 360,224 420,206 480,184 540,158"
            fill="none" stroke="#888" stroke-width="2.5" stroke-dasharray="7 4"/>
  <text x="440" y="200" font-size="12" fill="#777">SMA50 (rising)</text>

  <!-- Candles: overall uptrend with two small pullbacks -->
  <g>
    <line x1="60"  y1="205" x2="60"  y2="240" stroke="#1e7e34" stroke-width="2"/>
    <rect x="48"  y="215" width="24" height="15" fill="#5cb85c" stroke="#1e7e34" stroke-width="1.5"/>

    <line x1="120" y1="185" x2="120" y2="225" stroke="#1e7e34" stroke-width="2"/>
    <rect x="108" y="195" width="24" height="20" fill="#5cb85c" stroke="#1e7e34" stroke-width="1.5"/>

    <line x1="180" y1="180" x2="180" y2="215" stroke="#a02c2c" stroke-width="2"/>
    <rect x="168" y="195" width="24" height="10" fill="#e05a4d" stroke="#a02c2c" stroke-width="1.5"/>

    <line x1="240" y1="165" x2="240" y2="215" stroke="#1e7e34" stroke-width="2"/>
    <rect x="228" y="175" width="24" height="30" fill="#5cb85c" stroke="#1e7e34" stroke-width="1.5"/>

    <line x1="300" y1="140" x2="300" y2="185" stroke="#1e7e34" stroke-width="2"/>
    <rect x="288" y="150" width="24" height="25" fill="#5cb85c" stroke="#1e7e34" stroke-width="1.5"/>

    <line x1="360" y1="140" x2="360" y2="170" stroke="#a02c2c" stroke-width="2"/>
    <rect x="348" y="150" width="24" height="10" fill="#e05a4d" stroke="#a02c2c" stroke-width="1.5"/>

    <line x1="420" y1="115" x2="420" y2="170" stroke="#1e7e34" stroke-width="2"/>
    <rect x="408" y="125" width="24" height="35" fill="#5cb85c" stroke="#1e7e34" stroke-width="1.5"/>

    <line x1="480" y1="85"  x2="480" y2="135" stroke="#1e7e34" stroke-width="2"/>
    <rect x="468" y="95"  width="24" height="30" fill="#5cb85c" stroke="#1e7e34" stroke-width="1.5"/>

    <line x1="540" y1="55"  x2="540" y2="105" stroke="#1e7e34" stroke-width="2"/>
    <rect x="528" y="65"  width="24" height="30" fill="#5cb85c" stroke="#1e7e34" stroke-width="1.5"/>
  </g>

  <!-- distance connector at the last candle -->
  <line x1="580" y1="80" x2="580" y2="158" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="572" y1="80" x2="588" y2="80" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="572" y1="158" x2="588" y2="158" stroke="#c0392b" stroke-width="1.5"/>
  <text x="595" y="122" font-size="12" fill="#c0392b">price_vs_sma50</text>
  <text x="595" y="138" font-size="11" fill="#c0392b">(growing gap, in ATRs)</text>

  <text x="200" y="285" font-size="12" fill="#333">sma50_slope_5 &gt; 0 — the dashed line itself is climbing, confirming the trend</text>
</svg>
