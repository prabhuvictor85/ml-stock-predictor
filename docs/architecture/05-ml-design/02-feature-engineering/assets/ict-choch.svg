<svg viewBox="0 0 480 280" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="480" height="280" fill="#ffffff"/>
  <text x="240" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">CHoCH — the first crack in a downtrend</text>

  <!-- Swing high ticks (descending) -->
  <line x1="40"  y1="60"  x2="120" y2="60"  stroke="#888" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="120" y1="100" x2="220" y2="100" stroke="#888" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="220" y1="140" x2="320" y2="140" stroke="#888" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="45" y="54"  font-size="10" fill="#777">Swing High 1</text>
  <text x="125" y="94" font-size="10" fill="#777">Swing High 2 (lower)</text>
  <text x="225" y="134" font-size="10" fill="#777">Swing High 3 (lower still)</text>

  <!-- bearish continuation candles -->
  <g stroke="#a02c2c" stroke-width="1.5">
    <line x1="80"  y1="65"  x2="80"  y2="110"/>
    <rect x="68"  y="75"  width="24" height="25" fill="#e05a4d"/>
    <line x1="180" y1="105" x2="180" y2="150"/>
    <rect x="168" y="115" width="24" height="25" fill="#e05a4d"/>
    <line x1="280" y1="145" x2="280" y2="190"/>
    <rect x="268" y="155" width="24" height="25" fill="#e05a4d"/>
  </g>
  <text x="80"  y="228" text-anchor="middle" font-size="10" fill="#777">bear_BOS</text>
  <text x="180" y="228" text-anchor="middle" font-size="10" fill="#777">bear_BOS</text>
  <text x="280" y="228" text-anchor="middle" font-size="10" fill="#777">bear_BOS</text>
  <text x="180" y="244" text-anchor="middle" font-size="10" fill="#777">(continuation, continuation)</text>

  <!-- CHoCH candle: breaks ABOVE swing high 3 -->
  <line x1="400" y1="90" x2="400" y2="205" stroke="#1e7e34" stroke-width="2.5"/>
  <rect x="382" y="105" width="36" height="75" fill="#5cb85c" stroke="#1e7e34" stroke-width="2.5"/>
  <text x="400" y="80" text-anchor="middle" font-size="11" fill="#1e7e34">bull_BOS —</text>
  <text x="400" y="228" text-anchor="middle" font-size="11" fill="#1e7e34" font-weight="bold">but this is a bull_CHoCH:</text>
  <text x="400" y="244" text-anchor="middle" font-size="10" fill="#1e7e34">breaks AGAINST the bear structure</text>
</svg>
