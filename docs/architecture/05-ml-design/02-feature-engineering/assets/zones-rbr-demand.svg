<svg viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="520" height="300" fill="#ffffff"/>
  <text x="260" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">RBR (Rally → Base → Rally) forms a Demand Zone</text>

  <!-- Zone band (extends forward in time, to the right) -->
  <rect x="50" y="128" width="430" height="20" fill="#c8e6c9" opacity="0.7" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="490" y="142" font-size="11" fill="#2e7d32">Demand Zone</text>
  <text x="55" y="123" font-size="11" fill="#2e7d32">Proximal (upper edge — base close)</text>
  <text x="55" y="163" font-size="11" fill="#2e7d32">Distal (lower edge — confirming rally's low)</text>

  <!-- Candle 1: Rally -->
  <line x1="120" y1="140" x2="120" y2="200" stroke="#1e7e34" stroke-width="2"/>
  <rect x="105" y="145" width="30" height="50" fill="#5cb85c" stroke="#1e7e34" stroke-width="2"/>
  <text x="120" y="220" text-anchor="middle" font-size="12" fill="#333">Rally</text>

  <!-- Candle 2: Base -->
  <line x1="220" y1="132" x2="220" y2="160" stroke="#2e6da4" stroke-width="2"/>
  <rect x="205" y="138" width="30" height="10" fill="#7fb3e8" stroke="#2e6da4" stroke-width="2"/>
  <text x="220" y="220" text-anchor="middle" font-size="12" fill="#333">Base</text>
  <text x="220" y="236" text-anchor="middle" font-size="11" fill="#777">(small pause)</text>

  <!-- Candle 3: Rally (confirming) -->
  <line x1="320" y1="70" x2="320" y2="138" stroke="#1e7e34" stroke-width="2"/>
  <rect x="305" y="75" width="30" height="60" fill="#5cb85c" stroke="#1e7e34" stroke-width="2"/>
  <text x="320" y="220" text-anchor="middle" font-size="12" fill="#333">Rally (confirms)</text>

  <text x="260" y="270" text-anchor="middle" font-size="12" fill="#333">If price ever falls back into this band, the pattern says buyers</text>
  <text x="260" y="286" text-anchor="middle" font-size="12" fill="#333">previously stepped in here — and may step in again.</text>
</svg>
