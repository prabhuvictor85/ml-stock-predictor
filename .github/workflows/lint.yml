name: lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  syntax-check:
    name: Python syntax sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile-check all Python files
        run: |
          # Catches syntax errors anywhere in the codebase without running anything
          python -m compileall -q -f pipeline scripts tests \
                              run_nse_local.py \
                              run_nse_tradingv_local.py \
                              run_sp500_local.py \
                              dashboard.py
