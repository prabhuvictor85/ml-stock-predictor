<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="720" height="300" fill="#ffffff"/>

  <text x="110" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Rally candle</text>
  <text x="360" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Drop candle</text>
  <text x="610" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Base candle</text>

  <line x1="235" y1="10" x2="235" y2="270" stroke="#ddd" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="485" y1="10" x2="485" y2="270" stroke="#ddd" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- ===== Panel 1: Rally ===== -->
  <line x1="30" y1="140" x2="210" y2="140" stroke="#888" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="35" y="134" font-size="11" fill="#777">Prior High</text>

  <line x1="70" y1="140" x2="70" y2="200" stroke="#7f8c8d" stroke-width="1.5"/>
  <rect x="58" y="160" width="24" height="20" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>

  <line x1="150" y1="70" x2="150" y2="145" stroke="#1e7e34" stroke-width="2"/>
  <rect x="138" y="90" width="24" height="48" fill="#5cb85c" stroke="#1e7e34" stroke-width="2"/>

  <text x="110" y="260" text-anchor="middle" font-size="12" fill="#333">bullish &amp; closes above</text>
  <text x="110" y="276" text-anchor="middle" font-size="12" fill="#333">the prior candle's High</text>

  <!-- ===== Panel 2: Drop ===== -->
  <line x1="280" y1="200" x2="460" y2="200" stroke="#888" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="285" y="216" font-size="11" fill="#777">Prior Low</text>

  <line x1="320" y1="140" x2="320" y2="200" stroke="#7f8c8d" stroke-width="1.5"/>
  <rect x="308" y="160" width="24" height="20" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>

  <line x1="400" y1="195" x2="400" y2="270" stroke="#a02c2c" stroke-width="2"/>
  <rect x="388" y="202" width="24" height="48" fill="#e05a4d" stroke="#a02c2c" stroke-width="2"/>

  <text x="360" y="260" text-anchor="middle" font-size="12" fill="#333">bearish &amp; closes below</text>
  <text x="360" y="276" text-anchor="middle" font-size="12" fill="#333">the prior candle's Low</text>

  <!-- ===== Panel 3: Base ===== -->
  <line x1="530" y1="90"  x2="710" y2="90"  stroke="#888" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="530" y1="220" x2="710" y2="220" stroke="#888" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="535" y="84" font-size="11" fill="#777">Prior High</text>
  <text x="535" y="234" font-size="11" fill="#777">Prior Low</text>

  <line x1="570" y1="90" x2="570" y2="220" stroke="#7f8c8d" stroke-width="1.5"/>
  <rect x="558" y="150" width="24" height="20" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>

  <line x1="650" y1="145" x2="650" y2="175" stroke="#2e6da4" stroke-width="2"/>
  <rect x="638" y="155" width="24" height="10" fill="#7fb3e8" stroke="#2e6da4" stroke-width="2"/>

  <text x="610" y="260" text-anchor="middle" font-size="12" fill="#333">small body stays INSIDE the</text>
  <text x="610" y="276" text-anchor="middle" font-size="12" fill="#333">prior candle's [Low, High]</text>
</svg>
