<svg viewBox="0 0 480 280" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="480" height="280" fill="#ffffff"/>
  <text x="240" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Bullish Order Block formation</text>

  <!-- OB zone band: the prior (red) candle's body, extended forward in time -->
  <rect x="140" y="140" width="320" height="30" fill="#ffcdd2" opacity="0.6" stroke="#a02c2c" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="465" y="160" text-anchor="end" font-size="11" fill="#a02c2c">Order Block zone</text>

  <!-- Prior candle (red) -->
  <line x1="200" y1="130" x2="200" y2="180" stroke="#a02c2c" stroke-width="2"/>
  <rect x="185" y="140" width="30" height="30" fill="#e05a4d" stroke="#a02c2c" stroke-width="2"/>
  <text x="200" y="200" text-anchor="middle" font-size="12" fill="#333">prior candle (red)</text>

  <!-- Impulse candle (green) -->
  <line x1="300" y1="75" x2="300" y2="185" stroke="#1e7e34" stroke-width="2"/>
  <rect x="285" y="95" width="30" height="80" fill="#5cb85c" stroke="#1e7e34" stroke-width="2"/>
  <text x="300" y="65" text-anchor="middle" font-size="12" fill="#333">this candle (green, the "impulse")</text>
  <text x="300" y="200" text-anchor="middle" font-size="12" fill="#333">closes ABOVE the prior candle's open</text>

  <text x="240" y="240" text-anchor="middle" font-size="12" fill="#333">The red candle's body becomes the Order Block — price is expected to</text>
  <text x="240" y="256" text-anchor="middle" font-size="12" fill="#333">potentially return here later, since buyers were quietly building a position just before the breakout.</text>
</svg>
