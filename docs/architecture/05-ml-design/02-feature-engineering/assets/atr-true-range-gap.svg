<svg viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="640" height="300" fill="#ffffff"/>

  <!-- Titles -->
  <text x="160" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Day 1 (normal range)</text>
  <text x="480" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Day 2 (gap DOWN overnight)</text>

  <line x1="320" y1="10" x2="320" y2="280" stroke="#ccc" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- ===== Day 1: normal range candle ===== -->
  <line x1="160" y1="80" x2="160" y2="230" stroke="#2e6da4" stroke-width="2"/>
  <rect x="140" y="110" width="40" height="40" fill="#7fb3e8" stroke="#2e6da4" stroke-width="2"/>
  <text x="205" y="84"  font-size="12" fill="#333">High</text>
  <text x="205" y="234" font-size="12" fill="#333">Low</text>
  <text x="160" y="265" text-anchor="middle" font-size="13" fill="#333">TR = High − Low</text>
  <text x="160" y="282" text-anchor="middle" font-size="11" fill="#777">(no gap — this is the largest term)</text>

  <!-- ===== Day 2: gap-down candle ===== -->
  <line x1="360" y1="70" x2="600" y2="70" stroke="#888" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="605" y="74" font-size="12" fill="#777">Prior Close</text>

  <!-- gap connector -->
  <line x1="480" y1="70" x2="480" y2="110" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="2 3"/>
  <text x="490" y="92" font-size="11" fill="#c0392b">gap</text>

  <line x1="480" y1="110" x2="480" y2="240" stroke="#a02c2c" stroke-width="2"/>
  <rect x="460" y="160" width="40" height="40" fill="#e05a4d" stroke="#a02c2c" stroke-width="2"/>
  <text x="525" y="114" font-size="12" fill="#333">High</text>
  <text x="525" y="244" font-size="12" fill="#333">Low</text>
  <text x="480" y="265" text-anchor="middle" font-size="13" fill="#333">TR = |High − PrevClose|</text>
  <text x="480" y="282" text-anchor="middle" font-size="11" fill="#777">(the gap dominates the range)</text>
</svg>
