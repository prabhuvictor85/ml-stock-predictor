<svg viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="640" height="300" fill="#ffffff"/>

  <text x="160" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">+DM day (upward breakout)</text>
  <text x="480" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">−DM day (downward breakout)</text>
  <line x1="320" y1="10" x2="320" y2="280" stroke="#ccc" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- ===== Left: +DM day ===== -->
  <line x1="40" y1="140" x2="260" y2="140" stroke="#888" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="45" y="134" font-size="12" fill="#777">Yesterday High</text>

  <line x1="160" y1="90" x2="160" y2="190" stroke="#1e7e34" stroke-width="2"/>
  <rect x="140" y="120" width="40" height="40" fill="#5cb85c" stroke="#1e7e34" stroke-width="2"/>

  <line x1="200" y1="140" x2="200" y2="92" stroke="#1e7e34" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="208" y="115" font-size="12" fill="#1e7e34">up_move</text>
  <text x="160" y="230" text-anchor="middle" font-size="13" fill="#333">+DM = up_move   (−DM = 0)</text>

  <!-- ===== Right: -DM day ===== -->
  <line x1="380" y1="160" x2="600" y2="160" stroke="#888" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="385" y="176" font-size="12" fill="#777">Yesterday Low</text>

  <line x1="480" y1="110" x2="480" y2="210" stroke="#a02c2c" stroke-width="2"/>
  <rect x="460" y="140" width="40" height="40" fill="#e05a4d" stroke="#a02c2c" stroke-width="2"/>

  <line x1="440" y1="160" x2="440" y2="208" stroke="#a02c2c" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="380" y="200" font-size="12" fill="#a02c2c">down_move</text>
  <text x="480" y="245" text-anchor="middle" font-size="13" fill="#333">−DM = down_move   (+DM = 0)</text>

  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#1e7e34"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#a02c2c"/>
    </marker>
  </defs>
</svg>
