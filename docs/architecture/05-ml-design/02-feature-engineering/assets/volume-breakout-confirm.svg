<svg viewBox="0 0 640 340" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="640" height="340" fill="#ffffff"/>

  <text x="160" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Confirmed breakout (heavy volume)</text>
  <text x="480" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Unconfirmed breakout (thin volume)</text>
  <line x1="320" y1="10" x2="320" y2="330" stroke="#ccc" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- ===== LEFT: confirmed ===== -->
  <line x1="40" y1="150" x2="280" y2="150" stroke="#888" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="45" y="144" font-size="11" fill="#777">prior resistance</text>

  <g stroke="#1e7e34" stroke-width="1.5">
    <line x1="70"  y1="160" x2="70"  y2="200"/>
    <rect x="55"  y="170" width="30" height="20" fill="#5cb85c"/>
    <line x1="140" y1="145" x2="140" y2="178"/>
    <rect x="125" y="155" width="30" height="15" fill="#5cb85c"/>
    <line x1="210" y1="85"  x2="210" y2="160"/>
    <rect x="195" y="95"  width="30" height="60" fill="#5cb85c" stroke-width="2.5"/>
  </g>

  <!-- volume bars (baseline y=300) -->
  <line x1="30" y1="300" x2="290" y2="300" stroke="#333" stroke-width="1"/>
  <rect x="55"  y="285" width="30" height="15" fill="#7f8c8d"/>
  <rect x="125" y="275" width="30" height="25" fill="#7f8c8d"/>
  <rect x="195" y="225" width="30" height="75" fill="#e67e22"/>
  <text x="160" y="318" text-anchor="middle" font-size="12" fill="#333">vol_ratio_5d = 2.8</text>
  <text x="160" y="333" text-anchor="middle" font-size="11" fill="#777">heavy participation confirms the breakout</text>

  <!-- ===== RIGHT: unconfirmed ===== -->
  <line x1="360" y1="150" x2="600" y2="150" stroke="#888" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="365" y="144" font-size="11" fill="#777">prior resistance</text>

  <g stroke="#1e7e34" stroke-width="1.5">
    <line x1="390" y1="160" x2="390" y2="200"/>
    <rect x="375" y="170" width="30" height="20" fill="#5cb85c"/>
    <line x1="460" y1="145" x2="460" y2="178"/>
    <rect x="445" y="155" width="30" height="15" fill="#5cb85c"/>
    <line x1="530" y1="85"  x2="530" y2="160"/>
    <rect x="515" y="95"  width="30" height="60" fill="#5cb85c" stroke-width="2.5"/>
  </g>

  <line x1="350" y1="300" x2="610" y2="300" stroke="#333" stroke-width="1"/>
  <rect x="375" y="288" width="30" height="12" fill="#bdc3c7"/>
  <rect x="445" y="290" width="30" height="10" fill="#bdc3c7"/>
  <rect x="515" y="292" width="30" height="8"  fill="#bdc3c7"/>
  <text x="480" y="318" text-anchor="middle" font-size="12" fill="#333">vol_ratio_5d = 0.6</text>
  <text x="480" y="333" text-anchor="middle" font-size="11" fill="#777">thin volume — breakout likely to fade</text>
</svg>
