<svg viewBox="0 0 480 280" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="480" height="280" fill="#ffffff"/>
  <text x="240" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Premium / Discount — the current dealing range</text>

  <!-- Dealing range band -->
  <rect x="360" y="60" width="30" height="160" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <line x1="345" y1="60"  x2="420" y2="60"  stroke="#666" stroke-width="1.5"/>
  <text x="425" y="64" font-size="11" fill="#666">Swing High (position = 1.0)</text>
  <line x1="345" y1="140" x2="420" y2="140" stroke="#888" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="425" y="144" font-size="11" fill="#888">Equilibrium (0.5)</text>
  <line x1="345" y1="220" x2="420" y2="220" stroke="#666" stroke-width="1.5"/>
  <text x="425" y="224" font-size="11" fill="#666">Swing Low (position = 0.0)</text>

  <rect x="362" y="60"  width="26" height="80" fill="#ffcdd2" opacity="0.6"/>
  <text x="375" y="95" text-anchor="middle" font-size="10" fill="#a02c2c" transform="rotate(-90 375 95)">PREMIUM</text>
  <rect x="362" y="140" width="26" height="80" fill="#c8e6c9" opacity="0.6"/>
  <text x="375" y="185" text-anchor="middle" font-size="10" fill="#2e7d32" transform="rotate(-90 375 185)">DISCOUNT</text>

  <!-- Climbing price path -->
  <g stroke="#1e7e34" stroke-width="1.5">
    <line x1="80"  y1="190" x2="80"  y2="215"/>
    <rect x="68"  y="195" width="24" height="15" fill="#5cb85c"/>
    <line x1="150" y1="150" x2="150" y2="180"/>
    <rect x="138" y="158" width="24" height="15" fill="#5cb85c"/>
    <line x1="220" y1="95"  x2="220" y2="135"/>
    <rect x="208" y="100" width="24" height="25" fill="#5cb85c"/>
  </g>
  <text x="150" y="240" text-anchor="middle" font-size="12" fill="#333">price climbing from the discount half</text>
  <text x="220" y="80" text-anchor="middle" font-size="11" fill="#a02c2c">...into premium</text>
</svg>
